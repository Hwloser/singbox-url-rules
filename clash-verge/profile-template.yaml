mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

tun:
  enable: true
  stack: system
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - localhost
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - www.msftconnecttest.com
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  nameserver-policy:
    "geosite:cn":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
  respect-rules: true
  prefer-h3: false
  use-hosts: false
  use-system-hosts: false

proxies:
  - name: YOUR-VLESS-REALITY-NODE
    type: vless
    server: YOUR_SERVER_IP
    port: 443
    uuid: YOUR_UUID
    network: tcp
    udp: true
    tls: true
    flow: xtls-rprx-vision
    servername: apple.com
    client-fingerprint: chrome
    reality-opts:
      public-key: YOUR_REALITY_PUBLIC_KEY
      short-id: YOUR_REALITY_SHORT_ID

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - YOUR-VLESS-REALITY-NODE
      - DIRECT

rule-providers:
  privacy-reject:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Hwloser/singbox-url-rules/master/clash-verge/ruleset-reject.yaml?cb=2026062202-zai
    path: ./ruleset-reject-2026062202.yaml
    interval: 86400
  cn-direct:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Hwloser/singbox-url-rules/master/clash-verge/ruleset-direct.yaml?cb=2026062202-zai
    path: ./ruleset-direct-2026062202.yaml
    interval: 86400
  foreign-proxy:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Hwloser/singbox-url-rules/master/clash-verge/ruleset-proxy.yaml?cb=2026062202-zai
    path: ./ruleset-proxy-2026062202.yaml
    interval: 86400

rules:
  - RULE-SET,privacy-reject,REJECT
  - DST-PORT,3478,REJECT
  - DST-PORT,5349,REJECT
  - DST-PORT,19302-19309,REJECT
  - RULE-SET,foreign-proxy,PROXY
  - RULE-SET,cn-direct,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,PROXY
